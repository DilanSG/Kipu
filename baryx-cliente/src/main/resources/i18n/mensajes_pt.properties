tutorial.web.bienvenida.titulo=Como funciona a rede do Baryx?
tutorial.web.bienvenida.desc=O Baryx funciona com um servidor central na sua rede local (LAN). Este servidor armazena tudo: produtos, pedidos, usu\u00e1rios e vendas. Os dispositivos do bar (caixas, terminais de pedidos) se conectam a ele. N\u00e3o \u00e9 necess\u00e1rio internet para operar.
tutorial.web.bienvenida.tip=Neste tutorial, vamos gui\u00e1-lo passo a passo para conectar o servidor e configurar o sistema.
tutorial.web.conectar.titulo=Inicie o servidor
tutorial.web.conectar.desc=Pressione o bot\u00e3o dourado "Conectar" para iniciar o servidor do Baryx neste equipamento. O processo leva aproximadamente 25 segundos.
tutorial.web.conectar.tip=Pressione o bot\u00e3o para iniciar a conex\u00e3o com o servidor local.
