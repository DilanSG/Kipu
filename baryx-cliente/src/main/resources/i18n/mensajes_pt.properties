tutorial.web.arrancando.titulo=Servidor iniciando...
tutorial.web.arrancando.desc=O servidor est\u00e1 iniciando. Est\u00e1 carregando o banco de dados, executando migra\u00e7\u00f5es, configurando a seguran\u00e7a e preparando os servi\u00e7os. Voc\u00ea pode ver o progresso na barra acima.
tutorial.web.arrancando.tip=Este processo s\u00f3 acontece na inicializa\u00e7\u00e3o. Uma vez conectado, o servidor permanece ativo e todos os dispositivos podem se conectar.
tutorial.web.arrancando.esperando=Esperando o servidor terminar de iniciar...
tutorial.web.conectado.titulo=Servidor conectado!
tutorial.web.conectado.desc=O servidor est\u00e1 ativo e pronto para receber conex\u00f5es. A partir de outros dispositivos na sua rede local, use o IP exibido para se conectar.
tutorial.web.conectado.ip_info=IP deste servidor:
tutorial.web.conectado.tip=Os outros dispositivos do bar devem usar este IP e a porta 8080 para conectar como clientes. O bot\u00e3o "Desligar" no cart\u00e3o abaixo permite parar o servidor quando fechar o bar.
tutorial.web.nube.titulo=Backup na Nuvem (opcional)
tutorial.web.nube.desc=A se\u00e7\u00e3o "Nuvem / Atlas" permite sincronizar seus dados com o MongoDB Atlas como backup. \u00c9 opcional mas recomend\u00e1vel. Clique no bot\u00e3o "Configurar" no cart\u00e3o de Nuvem para abrir a configura\u00e7\u00e3o.
tutorial.web.nube.tip=Voc\u00ea precisar\u00e1 de uma conta gratuita do MongoDB Atlas e uma URI de conex\u00e3o. Os dados s\u00e3o sincronizados automaticamente conforme o intervalo configurado.
tutorial.web.nube.esperando=Esperando voc\u00ea abrir a configura\u00e7\u00e3o da nuvem...
tutorial.web.config_nube.titulo=Configurar backup na nuvem
tutorial.web.config_nube.desc=Preencha os campos de configura\u00e7\u00e3o para ativar o backup autom\u00e1tico no MongoDB Atlas.
tutorial.web.config_nube.mongo_uri=URI do MongoDB: A string de conex\u00e3o ao seu cluster do Atlas. Formato: mongodb+srv://usuario:senha@cluster.mongodb.net/
tutorial.web.config_nube.business_id=Identificador do neg\u00f3cio: Um nome \u00fanico para o seu bar. Usado para separar os dados de diferentes estabelecimentos no mesmo banco de dados.
tutorial.web.config_nube.tip=Voc\u00ea pode obter a URI no painel do MongoDB Atlas \u2192 Connect \u2192 Drivers. O identificador pode ser qualquer nome sem espa\u00e7os.
tutorial.web.config_nube.esperando=Completando configura\u00e7\u00e3o ou pulando...
tutorial.web.config_nube.saltar=Pular \u2192 Apenas LAN
tutorial.web.final.titulo=Configura\u00e7\u00e3o completa!
tutorial.web.final.titulo_lan=Conex\u00e3o LAN pronta
tutorial.web.final.con_nube.desc=Seu sistema Baryx est\u00e1 completamente configurado. O servidor est\u00e1 ativo, os dispositivos podem se conectar por LAN e seus dados s\u00e3o respaldados automaticamente na nuvem. Feche este painel para voltar ao login e fazer login.
tutorial.web.final.sin_nube.desc=A conex\u00e3o LAN est\u00e1 pronta. O servidor est\u00e1 ativo e os dispositivos podem se conectar. No entanto, voc\u00ea n\u00e3o configurou o backup na nuvem.
tutorial.web.final.sin_nube.limitaciones=Sem backup na nuvem: os dados existem apenas neste equipamento. Se o disco falhar ou o equipamento for perdido, n\u00e3o haver\u00e1 como recuperar as informa\u00e7\u00f5es.
tutorial.web.final.sin_nube.reiniciar=Se fechar o servidor sem configurar a nuvem, poder\u00e1 habilit\u00e1-la depois reiniciando o servidor, ou a partir do painel de configura\u00e7\u00e3o do administrador.
tutorial.web.final.tip=Voc\u00ea pode reabrir este painel a partir do bot\u00e3o "Conectar" no login ou em Configura\u00e7\u00f5es \u2192 Conex\u00e3o de Rede no menu principal.
tutorial.web.error_srv.titulo=Erro ao iniciar o servidor
tutorial.web.error_srv.desc=O servidor n\u00e3o p\u00f4de iniciar. Verifique as seguintes sugest\u00f5es:
tutorial.web.error_srv.sug1=Verifique se o PostgreSQL est\u00e1 rodando (servi\u00e7o postgresql ativo)
tutorial.web.error_srv.sug2=Verifique se o arquivo .env em ~/.baryx/.env tem as credenciais corretas do banco de dados
tutorial.web.error_srv.sug3=Certifique-se de que a porta 8080 n\u00e3o est\u00e1 sendo usada por outro aplicativo
tutorial.web.error_srv.sug4=Verifique os logs do servidor na pasta logs/ para mais detalhes
tutorial.web.error_srv.reintentar=Tentar novamente
tutorial.web.error_nube.titulo=Erro de conex\u00e3o com a nuvem
tutorial.web.error_nube.desc=N\u00e3o foi poss\u00edvel verificar a conex\u00e3o com o MongoDB Atlas. Sugest\u00f5es:
tutorial.web.error_nube.sug1=Verifique se a URI do MongoDB est\u00e1 correta e tem o formato mongodb+srv://
tutorial.web.error_nube.sug2=Certifique-se de ter conex\u00e3o com a internet (necess\u00e1ria apenas para a nuvem, n\u00e3o para operar)
tutorial.web.error_nube.sug3=Confirme que o IP deste equipamento est\u00e1 na lista branca do Atlas (Network Access)

