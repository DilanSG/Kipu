tutorial.titulo=Gu\u00eda de Conexi\u00f3n
tutorial.siguiente=Siguiente
tutorial.volver=Volver
tutorial.entendido=Entendido
tutorial.omitir=Omitir tutorial
tutorial.boton=Tutorial
tutorial.web.bienvenida.titulo=\u00bfC\u00f3mo funciona la red de Baryx?
tutorial.web.bienvenida.desc=Baryx funciona con un servidor central en tu red local (LAN). Este servidor almacena todo: productos, pedidos, usuarios y ventas. Los equipos del bar (cajas, comanderas) se conectan a \u00e9l. No necesitas internet para operar.
tutorial.web.bienvenida.tip=En este tutorial te guiaremos paso a paso para conectar el servidor y configurar el sistema.
tutorial.web.conectar.titulo=Inicia el servidor
tutorial.web.conectar.desc=Presiona el bot\u00f3n dorado "Conectar" para arrancar el servidor de Baryx en este equipo. El proceso tarda aproximadamente 25 segundos.
tutorial.web.conectar.tip=Presiona el bot\u00f3n para iniciar la conexi\u00f3n con el servidor local.
tutorial.web.conectar.esperando=Esperando que presiones "Conectar"...
tutorial.web.conectar.btn=Esperando acci\u00f3n...
tutorial.web.arrancando.titulo=Servidor iniciando...
tutorial.web.arrancando.desc=El servidor se est\u00e1 iniciando. Est\u00e1 cargando la base de datos, ejecutando migraciones, configurando la seguridad y preparando los servicios. Puedes ver el progreso en la barra de arriba.
tutorial.web.arrancando.tip=Este proceso solo ocurre al arrancar. Una vez conectado, el servidor permanece activo y todos los equipos pueden conectarse.
tutorial.web.arrancando.esperando=Esperando que el servidor termine de arrancar...
tutorial.web.conectado.titulo=\u00a1Servidor conectado!
tutorial.web.conectado.desc=El servidor est\u00e1 activo y listo para recibir conexiones. Desde otros equipos en tu red local, usa la IP mostrada para conectarse.
tutorial.web.conectado.ip_info=IP de este servidor:
tutorial.web.conectado.tip=Los otros equipos del bar deben usar esta IP y el puerto 8080 para conectarse como clientes. El bot\u00f3n "Apagar" en la tarjeta inferior permite detener el servidor cuando cierres el bar.
tutorial.web.nube.titulo=Respaldo en la Nube (opcional)
tutorial.web.nube.desc=La secci\u00f3n "Nube / Atlas" permite sincronizar tus datos a MongoDB Atlas como respaldo. Es opcional pero recomendable. Haz clic en el bot\u00f3n "Configurar" de la tarjeta de Nube para abrir la configuraci\u00f3n.
tutorial.web.nube.tip=Necesitar\u00e1s una cuenta gratuita de MongoDB Atlas y una URI de conexi\u00f3n. Los datos se sincronizan autom\u00e1ticamente seg\u00fan el intervalo configurado.
tutorial.web.nube.esperando=Esperando que abras la configuraci\u00f3n de nube...
tutorial.web.config_nube.titulo=Configurar respaldo en la nube
tutorial.web.config_nube.desc=Completa los campos de configuraci\u00f3n para activar el respaldo autom\u00e1tico en MongoDB Atlas.
tutorial.web.config_nube.mongo_uri=URI de MongoDB: La cadena de conexi\u00f3n a tu cluster de Atlas. Tiene el formato mongodb+srv://usuario:contrase\u00f1a@cluster.mongodb.net/
tutorial.web.config_nube.business_id=Identificador de negocio: Un nombre \u00fanico para tu bar. Se usa para separar los datos de diferentes establecimientos en la misma base de datos.
tutorial.web.config_nube.tip=Puedes obtener la URI desde el panel de MongoDB Atlas \u2192 Connect \u2192 Drivers. El identificador puede ser cualquier nombre sin espacios.
tutorial.web.config_nube.esperando=Completando configuraci\u00f3n o saltando...
tutorial.web.config_nube.saltar=Saltar \u2192 Solo usar LAN
tutorial.web.final.titulo=\u00a1Configuraci\u00f3n completa!
tutorial.web.final.titulo_lan=Conexi\u00f3n LAN lista
tutorial.web.final.con_nube.desc=Tu sistema Baryx est\u00e1 completamente configurado. El servidor est\u00e1 activo, los equipos pueden conectarse por LAN y tus datos se respaldan autom\u00e1ticamente en la nube. Cierra este panel para volver al login e iniciar sesi\u00f3n.
tutorial.web.final.sin_nube.desc=La conexi\u00f3n LAN est\u00e1 lista. El servidor est\u00e1 activo y los equipos pueden conectarse. Sin embargo, no configuraste el respaldo en la nube.
tutorial.web.final.sin_nube.limitaciones=Sin respaldo en la nube: los datos solo existen en este equipo. Si el disco falla o el equipo se pierde, no habr\u00e1 forma de recuperar la informaci\u00f3n.
tutorial.web.final.sin_nube.reiniciar=Si cierras el servidor sin configurar la nube, podr\u00e1s habilitarla despu\u00e9s reiniciando el servidor, o desde el panel de configuraci\u00f3n del administrador.
tutorial.web.final.tip=Puedes volver a abrir este panel desde el bot\u00f3n "Conectar" del login o desde Configuraci\u00f3n \u2192 Conexi\u00f3n Red en el men\u00fa principal.
tutorial.web.error_srv.titulo=Error al iniciar el servidor
tutorial.web.error_srv.desc=El servidor no pudo arrancar. Revisa las siguientes sugerencias:
tutorial.web.error_srv.sug1=Verifica que PostgreSQL est\u00e9 corriendo (servicio postgresql activo)
tutorial.web.error_srv.sug2=Revisa que el archivo .env en ~/.baryx/.env tenga las credenciales correctas de la base de datos
tutorial.web.error_srv.sug3=Aseg\u00farate de que el puerto 8080 no est\u00e9 siendo usado por otra aplicaci\u00f3n
tutorial.web.error_srv.sug4=Revisa los logs del servidor en la carpeta logs/ para m\u00e1s detalles
tutorial.web.error_srv.reintentar=Reintentar conexi\u00f3n
tutorial.web.error_nube.titulo=Error de conexi\u00f3n a la nube
tutorial.web.error_nube.desc=No se pudo verificar la conexi\u00f3n con MongoDB Atlas. Sugerencias:
tutorial.web.error_nube.sug1=Verifica que la URI de MongoDB sea correcta y tenga el formato mongodb+srv://
tutorial.web.error_nube.sug2=Aseg\u00farate de tener conexi\u00f3n a internet (solo necesaria para la nube, no para operar)
tutorial.web.error_nube.sug3=Confirma que la IP de este equipo est\u00e9 en la lista blanca de Atlas (Network Access)

