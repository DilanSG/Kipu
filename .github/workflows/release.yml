name: Release Kipu

on:
  push:
    tags:
      - "v*.*.*"

# ---------------------------------------------------------------------------
# Permissions
# ---------------------------------------------------------------------------
permissions:
  contents: write  # needed to create GitHub Releases

env:
  # Extract version from tag (v0.0.1 → 0.0.1)
  APP_VERSION: ${{ github.ref_name != '' && github.ref_name || '0.0.0' }}
  # Opt-in to Node.js 24 to silence deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================================================
  # JOB 1 — Build & package on Linux
  # Compiles the JARs (shared by other jobs via artifact) and packages .deb
  # ==========================================================================
  build-linux:
    name: "Build — Linux (.deb)"
    runs-on: ubuntu-latest

    outputs:
      app_version: ${{ steps.get_version.outputs.version }}
      trial_key: ${{ steps.trial_key.outputs.key }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Extract version from tag
        id: get_version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Request trial license key from backend
        id: trial_key
        env:
          KIPU_API_URL: ${{ secrets.KIPU_API_URL }}
          KIPU_ADMIN_KEY: ${{ secrets.KIPU_ADMIN_KEY }}
        run: |
          if [ -z "$KIPU_API_URL" ] || [ -z "$KIPU_ADMIN_KEY" ]; then
            echo "::warning::KIPU_API_URL o KIPU_ADMIN_KEY no configurados. Se omite licencia trial."
            echo "key=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Wake-up ping (Render free tier duerme tras 15 min de inactividad)
          echo "Despertando backend (cold-start puede tardar ~60s)..."
          curl -so /dev/null --max-time 90 "${KIPU_API_URL}/v1/releases/latest" || true
          # Intentar obtener licencia trial (2 intentos, 60s timeout cada uno)
          for i in 1 2; do
            RESPONSE=$(curl -sf --max-time 60 \
              -X POST "${KIPU_API_URL}/v1/admin/licenses/trial" \
              -H "Authorization: Bearer ${KIPU_ADMIN_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"trialDays": 14}') && break
            echo "::notice::Intento $i fallido (curl exit $?), reintentando en 10s..."
            sleep 10
            RESPONSE=""
          done
          if [ -z "$RESPONSE" ]; then
            echo "::warning::No se pudo obtener licencia trial del backend tras 2 intentos."
            echo "key=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LICENSE_KEY=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['licenseKey'])")
          echo "::add-mask::$LICENSE_KEY"
          echo "key=$LICENSE_KEY" >> "$GITHUB_OUTPUT"

      - name: Inject trial key into license.properties
        run: |
          PROPS="kipu-cliente/src/main/resources/license.properties"
          mkdir -p "$(dirname "$PROPS")"
          KEY="${{ steps.trial_key.outputs.key }}"
          if [ -n "$KEY" ]; then
            printf 'license.key=%s\nlicense.type=trial\n' "$KEY" > "$PROPS"
          else
            echo "::notice::Sin licencia trial — se genera properties vacío"
            printf 'license.key=\nlicense.type=trial\n' > "$PROPS"
          fi

      - name: Sync POM version with tag
        run: mvn versions:set -DnewVersion="${{ steps.get_version.outputs.version }}" -DgenerateBackupPoms=false -q

      - name: Build JARs
        env:
          KIPU_ATLAS_URI: ${{ secrets.KIPU_ATLAS_URI }}
        run: mvn clean package -DskipTests -q -Pmultiplataforma

      - name: Upload JARs for other jobs
        uses: actions/upload-artifact@v4
        with:
          name: kipu-jars
          path: |
            kipu-cliente/target/kipu-cliente-*.jar
            kipu-servidor/target/kipu-servidor-*.jar
          retention-days: 1

      - name: Install packaging dependencies
        run: sudo apt-get install -y dpkg

      - name: Package Linux (.deb)
        env:
          KIPU_VERSION: ${{ steps.get_version.outputs.version }}
          KIPU_API_URL: ${{ secrets.KIPU_API_URL }}
        run: chmod +x scripts/package.sh && ./scripts/package.sh todo deb

      - name: Compute SHA-256 checksum
        id: checksum_linux
        run: |
          FILE=$(ls packaging/distribuibles/linux/kipu_*.deb | head -1)
          HASH=$(sha256sum "$FILE" | awk '{print $1}')
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: packaging/distribuibles/linux/kipu_*.deb


  # ==========================================================================
  # JOB 2 — Build & package on Windows
  # Downloads JARs from Job 1, packages .exe via Inno Setup
  # ==========================================================================
  build-windows:
    name: "Build — Windows (.exe)"
    runs-on: windows-latest
    needs: build-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download JARs from Linux job
        uses: actions/download-artifact@v4
        with:
          name: kipu-jars

      - name: Restore JAR paths for packaging script
        shell: bash
        run: |
          mkdir -p kipu-cliente/target kipu-servidor/target
          mv kipu-cliente-*.jar kipu-cliente/target/ 2>/dev/null || true
          mv kipu-servidor-*.jar kipu-servidor/target/ 2>/dev/null || true

      - name: Inject trial key into license.properties
        shell: bash
        run: |
          mkdir -p kipu-cliente/src/main/resources
          PROPS="kipu-cliente/src/main/resources/license.properties"
          KEY="${{ needs.build-linux.outputs.trial_key }}"
          if [ -n "$KEY" ]; then
            printf 'license.key=%s\nlicense.type=trial\n' "$KEY" > "$PROPS"
          else
            echo "::notice::Sin licencia trial desde Linux job — se genera properties vacío"
            printf 'license.key=\nlicense.type=trial\n' > "$PROPS"
          fi

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Package Windows (.exe)
        shell: pwsh
        env:
          KIPU_VERSION: ${{ needs.build-linux.outputs.app_version }}
          KIPU_API_URL: ${{ secrets.KIPU_API_URL }}
        run: |
          .\scripts\package.ps1 todo exe

      - name: Compute SHA-256 checksum
        id: checksum_windows
        shell: bash
        run: |
          FILE=$(ls packaging/distribuibles/windows/Kipu-*.exe | head -1)
          HASH=$(sha256sum "$FILE" | awk '{print $1}')
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: packaging/distribuibles/windows/Kipu-*.exe


  # ==========================================================================
  # JOB 3 — Build & package on macOS
  # Downloads JARs from Job 1, packages .dmg via jpackage
  # ==========================================================================
  build-macos:
    name: "Build — macOS (.dmg)"
    runs-on: macos-latest
    needs: build-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download JARs from Linux job
        uses: actions/download-artifact@v4
        with:
          name: kipu-jars

      - name: Restore JAR paths for packaging script
        run: |
          mkdir -p kipu-cliente/target kipu-servidor/target
          mv kipu-cliente-*.jar kipu-cliente/target/ 2>/dev/null || true
          mv kipu-servidor-*.jar kipu-servidor/target/ 2>/dev/null || true

      - name: Inject trial key into license.properties
        run: |
          mkdir -p kipu-cliente/src/main/resources
          PROPS="kipu-cliente/src/main/resources/license.properties"
          KEY="${{ needs.build-linux.outputs.trial_key }}"
          if [ -n "$KEY" ]; then
            printf 'license.key=%s\nlicense.type=trial\n' "$KEY" > "$PROPS"
          else
            echo "::notice::Sin licencia trial desde Linux job — se genera properties vacío"
            printf 'license.key=\nlicense.type=trial\n' > "$PROPS"
          fi

      - name: Package macOS (.dmg)
        env:
          KIPU_VERSION: ${{ needs.build-linux.outputs.app_version }}
          KIPU_API_URL: ${{ secrets.KIPU_API_URL }}
        run: chmod +x scripts/package-mac.sh && ./scripts/package-mac.sh todo dmg

      - name: Compute SHA-256 checksum
        id: checksum_macos
        run: |
          FILE=$(ls packaging/distribuibles/macos/Kipu-*.dmg | head -1)
          HASH=$(shasum -a 256 "$FILE" | awk '{print $1}')
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: packaging/distribuibles/macos/Kipu-*.dmg


  # ==========================================================================
  # JOB 4 — Publish GitHub Release + register in backend DB
  # ==========================================================================
  publish-release:
    name: "Publish Release"
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]

    steps:
      - name: Checkout (for tag message / changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore annotated tags (checkout dereferences them)
        run: git fetch --tags --force

      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/

      - name: Compute all checksums
        id: checksums
        run: |
          LINUX_FILE=$(ls dist/kipu_*.deb 2>/dev/null | head -1)
          WINDOWS_FILE=$(ls dist/Kipu-*.exe 2>/dev/null | head -1)
          MACOS_FILE=$(ls dist/Kipu-*.dmg 2>/dev/null | head -1)

          [ -f "$LINUX_FILE" ]   && echo "linux_hash=$(sha256sum "$LINUX_FILE" | awk '{print $1}')"     >> "$GITHUB_OUTPUT" || echo "linux_hash="   >> "$GITHUB_OUTPUT"
          [ -f "$WINDOWS_FILE" ] && echo "windows_hash=$(sha256sum "$WINDOWS_FILE" | awk '{print $1}')" >> "$GITHUB_OUTPUT" || echo "windows_hash=" >> "$GITHUB_OUTPUT"
          [ -f "$MACOS_FILE" ]   && echo "macos_hash=$(sha256sum "$MACOS_FILE" | awk '{print $1}')"     >> "$GITHUB_OUTPUT" || echo "macos_hash="   >> "$GITHUB_OUTPUT"

          echo "linux_file=$LINUX_FILE"     >> "$GITHUB_OUTPUT"
          echo "windows_file=$WINDOWS_FILE" >> "$GITHUB_OUTPUT"
          echo "macos_file=$MACOS_FILE"     >> "$GITHUB_OUTPUT"

      - name: Extract tag annotation as release notes
        id: tag_notes
        run: |
          NOTES=$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" | head -50)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          name: "Kipu v${{ needs.build-linux.outputs.app_version }}"
          body: ${{ steps.tag_notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: dist/*

      - name: Parse changelog entries from tag message
        id: changelog
        run: |
          ENTRIES=$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" \
            | grep '^-' | sed 's/^- //' \
            | python3 -c "
          import sys, json
          lines = [l.strip() for l in sys.stdin.readlines() if l.strip()]
          print(json.dumps(lines))
          ")
          echo "entries=$ENTRIES" >> "$GITHUB_OUTPUT"

      - name: Register release in backend database
        env:
          KIPU_API_URL: ${{ secrets.KIPU_API_URL }}
          KIPU_ADMIN_KEY: ${{ secrets.KIPU_ADMIN_KEY }}
          VERSION: ${{ needs.build-linux.outputs.app_version }}
          LINUX_HASH: ${{ steps.checksums.outputs.linux_hash }}
          WINDOWS_HASH: ${{ steps.checksums.outputs.windows_hash }}
          MACOS_HASH: ${{ steps.checksums.outputs.macos_hash }}
          RELEASE_NOTES: ${{ steps.tag_notes.outputs.notes }}
          CHANGELOG_ENTRIES: ${{ steps.changelog.outputs.entries }}
        run: |
          # Build the download URLs from GitHub Release assets
          export RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}"

          export LINUX_FILE=$(basename "${{ steps.checksums.outputs.linux_file }}")
          export WINDOWS_FILE=$(basename "${{ steps.checksums.outputs.windows_file }}")
          export MACOS_FILE=$(basename "${{ steps.checksums.outputs.macos_file }}")

          export CHANNEL="stable"
          if [[ "${GITHUB_REF_NAME}" == *beta* ]] || [[ "${GITHUB_REF_NAME}" == *rc* ]]; then
            export CHANNEL="beta"
          fi

          PAYLOAD=$(python3 -c '
          import json, os
          version = os.environ["VERSION"]
          release_url = os.environ.get("RELEASE_URL", "")
          linux_f = os.environ.get("LINUX_FILE", "")
          windows_f = os.environ.get("WINDOWS_FILE", "")
          macos_f = os.environ.get("MACOS_FILE", "")
          channel = os.environ.get("CHANNEL", "stable")
          notes = os.environ.get("RELEASE_NOTES", "")
          entries_raw = os.environ.get("CHANGELOG_ENTRIES", "[]")
          try:
              entries = json.loads(entries_raw)
          except (json.JSONDecodeError, TypeError):
              entries = []
          print(json.dumps({
              "version": version,
              "channel": channel,
              "notes": notes,
              "changelogEntries": entries,
              "assets": {
                  "linux":   f"{release_url}/{linux_f}"   if linux_f   else None,
                  "windows": f"{release_url}/{windows_f}" if windows_f else None,
                  "macos":   f"{release_url}/{macos_f}"   if macos_f   else None,
              },
              "checksums": {
                  "linux":   os.environ.get("LINUX_HASH")   or None,
                  "windows": os.environ.get("WINDOWS_HASH") or None,
                  "macos":   os.environ.get("MACOS_HASH")   or None,
              },
              "isForced": False,
          }))
          ')

          curl -sf \
            -X POST "${KIPU_API_URL}/v1/admin/releases" \
            -H "Authorization: Bearer ${KIPU_ADMIN_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          echo "✅ Release v${VERSION} registered in backend"
