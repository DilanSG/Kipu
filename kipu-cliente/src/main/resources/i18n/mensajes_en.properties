tutorial.titulo=Connection Guide
tutorial.siguiente=Next
tutorial.volver=Back
tutorial.entendido=Got it
tutorial.omitir=Skip tutorial
tutorial.boton=Tutorial
tutorial.web.bienvenida.titulo=How does Kipu networking work?
tutorial.web.bienvenida.desc=Kipu runs on a central server within your local network (LAN). This server stores everything: products, orders, users, and sales. The bar's devices (registers, order terminals) connect to it. No internet needed to operate.
tutorial.web.bienvenida.tip=In this tutorial, we'll guide you step by step to connect the server and configure the system.
tutorial.web.conectar.titulo=Start the server
tutorial.web.conectar.desc=Press the gold "Connect" button to start the Kipu server on this machine. The process takes approximately 25 seconds.
tutorial.web.conectar.tip=Press the button to start the connection with the local server.
tutorial.web.conectar.esperando=Waiting for you to press "Connect"...
tutorial.web.conectar.btn=Waiting for action...
tutorial.web.arrancando.titulo=Server starting...
tutorial.web.arrancando.desc=The server is starting up. It's loading the database, running migrations, configuring security, and preparing services. You can see the progress on the bar above.
tutorial.web.arrancando.tip=This process only happens at startup. Once connected, the server stays active and all devices can connect.
tutorial.web.arrancando.esperando=Waiting for the server to finish starting...
tutorial.web.conectado.titulo=Server connected!
tutorial.web.conectado.desc=The server is active and ready to accept connections. From other devices on your local network, use the displayed IP to connect.
tutorial.web.conectado.ip_info=This server's IP:
tutorial.web.conectado.tip=Other bar devices should use this IP and port 8080 to connect as clients. The "Shutdown" button on the card below lets you stop the server when closing the bar.
tutorial.web.nube.titulo=Cloud Backup (optional)
tutorial.web.nube.desc=The "Cloud / Atlas" section lets you sync your data to MongoDB Atlas as a backup. It's optional but recommended. Click the "Configure" button on the Cloud card to open the configuration.
tutorial.web.nube.esperando=Waiting for you to open the cloud configuration...
tutorial.web.config_nube.titulo=Configure cloud backup
tutorial.web.config_nube.desc=Fill in the configuration fields to enable automatic backup to MongoDB Atlas.
tutorial.web.config_nube.business_id=Business identifier: A unique name for your bar. Used to separate data from different establishments in the same database.
tutorial.web.config_nube.tip=You can get the URI from the MongoDB Atlas panel \u2192 Connect \u2192 Drivers. The identifier can be any name without spaces.
tutorial.web.config_nube.esperando=Completing configuration or skipping...
tutorial.web.config_nube.saltar=Skip \u2192 LAN only
tutorial.web.final.titulo=Setup complete!
tutorial.web.final.titulo_lan=LAN connection ready
tutorial.web.final.con_nube.desc=Your Kipu system is fully configured. The server is active, devices can connect via LAN, and your data is automatically backed up to the cloud. Close this panel to return to login and sign in.
tutorial.web.final.sin_nube.desc=The LAN connection is ready. The server is active and devices can connect. However, you did not configure cloud backup.
tutorial.web.final.sin_nube.limitaciones=Without cloud backup: data only exists on this machine. If the disk fails or the machine is lost, there will be no way to recover the information.
tutorial.web.final.sin_nube.reiniciar=If you close the server without configuring the cloud, you can enable it later by restarting the server, or from the administrator configuration panel.
tutorial.web.final.tip=You can reopen this panel from the "Connect" button on the login or from Settings \u2192 Network Connection in the main menu.
tutorial.web.error_srv.titulo=Server start error
tutorial.web.error_srv.desc=The server could not start. Check the following suggestions:
tutorial.web.error_srv.sug1=Verify that PostgreSQL is running (postgresql service active)
tutorial.web.error_srv.sug2=Check that the .env file at ~/.kipu/.env has the correct database credentials
tutorial.web.error_srv.sug3=Make sure port 8080 is not being used by another application
tutorial.web.error_srv.sug4=Check the server logs in the logs/ folder for more details
tutorial.web.error_srv.reintentar=Retry connection
tutorial.web.error_nube.titulo=Cloud connection error
tutorial.web.error_nube.desc=Could not verify the MongoDB Atlas connection. Suggestions:
tutorial.web.error_nube.sug1=Verify the MongoDB URI is correct and has the mongodb+srv:// format
tutorial.web.error_nube.sug2=Make sure you have internet connectivity (only needed for cloud, not for operation)
tutorial.web.error_nube.sug3=Confirm this machine's IP is in the Atlas whitelist (Network Access)

