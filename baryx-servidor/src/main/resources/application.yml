spring:
  application:
    name: baryx-servidor
  
  # Configuración de base de datos
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:baryx_db}
    username: ${DB_USER:baryx_admin}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # Configuración JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
        enable_lazy_load_no_trans: false
    open-in-view: false
  
  # Flyway para migraciones
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    clean-disabled: false
    clean-on-validation-error: true
  
  # Configuración de servidor web
  servlet:
    context-path: /
  
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# Configuración JWT
jwt:
  secret: ${JWT_SECRET}
  expiracion: 86400000  # 24 horas en milisegundos
  refresh-expiracion: 604800000  # 7 días en milisegundos
  issuer: baryx-servidor

# Configuración de logging
logging:
  level:
    root: WARN
    com.baryx: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/baryx-servidor.log
    max-size: 10MB
    max-history: 30

# Sincronización con MongoDB Atlas (nube)
sync:
  nube:
    habilitado: ${SYNC_HABILITADO:false}
    mongodb-uri: ${MONGODB_URI:}
    business-id: ${BUSINESS_ID:negocio1}
    mongodb-db-name: ${MONGODB_DB_NAME:}
    intervalo-minutos: ${SYNC_INTERVALO:5}
    tamano-lote: ${SYNC_TAMANO_LOTE:100}
    dias-retencion: ${SYNC_DIAS_RETENCION:7}
    max-intentos-por-registro: ${SYNC_MAX_INTENTOS:5}

# Configuración del negocio
baryx:
  # Configuración de la caja
  caja:
    requiere-fondo-inicial: true
    permite-cierre-sin-cuadre: false
    diferencia-maxima-permitida: 50.00
  
  # Configuración de pedidos
  pedidos:
    tiempo-expiracion-minutos: 30
    permite-modificacion-pagado: false
  
  # Configuración de tickets
  tickets:
    impresora-habilitada: true
    formato: TICKET_80MM
