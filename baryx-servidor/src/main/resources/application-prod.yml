# Configuración para producción
spring:
  jpa:
    show-sql: false
  
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

logging:
  level:
    root: WARN
    com.baryx: INFO
    org.springframework.security: INFO

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
